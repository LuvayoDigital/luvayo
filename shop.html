<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luvayo Shop — Produits Tendance</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  min-height: 100vh;
}

.store {
  max-width: 480px;
  margin: 0 auto;
  padding: 36px 20px 60px;
}

/* HEADER */
.header { text-align: center; margin-bottom: 28px; }
.brand {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 5px;
  color: #D4A017;
  margin-bottom: 4px;
}
.brand-sub {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 3px;
  color: #475569;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.tagline {
  font-size: 13px;
  color: #64748b;
}
.divider {
  width: 36px;
  height: 2px;
  background: #D4A017;
  margin: 12px auto 0;
  border-radius: 2px;
}

/* SEARCH */
.search-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 28px;
  transition: border-color 0.2s;
}
.search-wrap:focus-within { border-color: #D4A017; }
.search-wrap input {
  background: none;
  border: none;
  outline: none;
  color: #e2e8f0;
  font-size: 15px;
  width: 100%;
}
.search-wrap input::placeholder { color: #475569; }

/* NO RESULT */
.no-result {
  display: none;
  text-align: center;
  color: #475569;
  font-size: 14px;
  padding: 50px 0;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* PRODUCT CARD */
.product-card {
  display: flex;
  flex-direction: column;
  gap: 10px;
  background: #1e293b;
  border: 1px solid #1e3a5f;
  border-radius: 14px;
  overflow: hidden;
  transition: transform 0.22s ease, box-shadow 0.22s ease;
  text-decoration: none;
  color: inherit;
}
.product-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.5);
  border-color: #D4A017;
}

/* IMAGE */
.product-img-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1;
  background: #f0f4f8;
  overflow: hidden;
}
.product-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.3s ease;
}
.product-card:hover .product-img-wrap img {
  transform: scale(1.05);
}
.badge-promo {
  position: absolute;
  top: 8px;
  left: 8px;
  background: #C0392B;
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  padding: 3px 7px;
  border-radius: 4px;
  letter-spacing: 0.5px;
}
.badge-stock {
  position: absolute;
  top: 8px;
  right: 8px;
  background: #16a34a;
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  padding: 3px 7px;
  border-radius: 4px;
}

/* INFO */
.product-info {
  padding: 0 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
}
.product-title {
  font-size: 13px;
  font-weight: 600;
  color: #e2e8f0;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* STARS */
.stars {
  display: flex;
  gap: 2px;
  align-items: center;
}
.star { color: #D4A017; font-size: 11px; }
.star-count { font-size: 10px; color: #64748b; margin-left: 3px; }

/* PRICE */
.price-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.price-new {
  font-size: 16px;
  font-weight: 700;
  color: #D4A017;
}
.price-old {
  font-size: 12px;
  color: #475569;
  text-decoration: line-through;
}

/* TAGS */
.product-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.tag {
  font-size: 10px;
  color: #94a3b8;
  background: #0f172a;
  border: 1px solid #1e3a5f;
  border-radius: 4px;
  padding: 2px 6px;
  white-space: nowrap;
}

/* WHATSAPP BUTTON */
.btn-whatsapp {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  background: #25D366;
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  padding: 9px 12px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.18s, transform 0.15s;
  margin-top: auto;
  letter-spacing: 0.3px;
}
.btn-whatsapp:hover {
  background: #1ebe5c;
  transform: scale(1.02);
}
.btn-whatsapp svg { flex-shrink: 0; }

/* TRUST BAR */
.trust-bar {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  margin-bottom: 28px;
  padding: 14px 0;
  border-top: 1px solid #1e293b;
  border-bottom: 1px solid #1e293b;
}
.trust-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: #64748b;
}
.trust-item span { font-size: 15px; }

/* FOOTER */
.footer {
  text-align: center;
  margin-top: 50px;
  font-size: 11px;
  color: #1e3a5f;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

@media (max-width: 400px) {
  .store { padding: 24px 12px 50px; }
  .brand { font-size: 22px; }
  .grid { gap: 12px; }
  .product-title { font-size: 12px; }
  .price-new { font-size: 14px; }
}
</style>
</head>
<body>

<div class="store">

  <div class="header">
    <div class="brand">LUVAYO</div>
    <div class="brand-sub">Shop</div>
    <div class="tagline">Produits sélectionnés pour vous 🇲🇦</div>
    <div class="divider"></div>
  </div>

  <div class="trust-bar">
    <div class="trust-item"><span>🚚</span> Livraison Maroc</div>
    <div class="trust-item"><span>💬</span> Commande WhatsApp</div>
    <div class="trust-item"><span>✅</span> Paiement à la livraison</div>
  </div>

  <div class="search-wrap">
    <svg width="15" height="15" fill="none" stroke="#475569" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0">
      <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Rechercher un produit..." oninput="filterProducts()">
  </div>

  <div class="no-result" id="noResult">Aucun produit trouvé.</div>
  <div class="grid" id="productGrid"></div>

  <div class="footer">© 2026 Luvayo Shop — Tous droits réservés</div>

</div>

<script>
const WA_NUMBER = "212777750713";

const products = [
  {
    title: "Ventilateur Double Turbine avec Brumisateur",
    price: "200 DH",
    oldPrice: "350 DH",
    stars: 5,
    reviews: 124,
    img: "vent4.jpg",
    tags: ["Climatisation", "LED", "Télécommande", "USB"],
    badge: "PROMO",
    stock: "En stock",
    message: "Bonjour, je voudrais commander le Ventilateur Double Turbine avec Brumisateur à 200 DH. Merci!"
  }
];

function starsHTML(n) {
  return Array.from({length: 5}, (_, i) =>
    `<span class="star">${i < n ? '★' : '☆'}</span>`
  ).join('');
}

function waLink(msg) {
  return `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;
}

function renderProducts(list) {
  const grid = document.getElementById('productGrid');
  grid.style.display = list.length === 0 ? 'none' : 'grid';
  grid.innerHTML = list.map(p => `
    <div class="product-card">
      <div class="product-img-wrap">
        <img src="${p.img}" alt="${p.title}"
          onerror="this.src='';this.style.background='#1e3a5f'">
        ${p.badge ? `<div class="badge-promo">${p.badge}</div>` : ''}
        ${p.stock ? `<div class="badge-stock">${p.stock}</div>` : ''}
      </div>
      <div class="product-info">
        <div class="product-title">${p.title}</div>
        <div class="stars">
          ${starsHTML(p.stars)}
          <span class="star-count">(${p.reviews})</span>
        </div>
        <div class="price-row">
          <span class="price-new">${p.price}</span>
          ${p.oldPrice ? `<span class="price-old">${p.oldPrice}</span>` : ''}
        </div>
        <div class="product-tags">
          ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
        <a class="btn-whatsapp" href="${waLink(p.message)}" target="_blank">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
          </svg>
          Commander
        </a>
      </div>
    </div>
  `).join('');
}

function filterProducts() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const filtered = q === ''
    ? products
    : products.filter(p =>
        p.title.toLowerCase().includes(q) ||
        p.tags.some(t => t.toLowerCase().includes(q))
      );
  renderProducts(filtered);
  document.getElementById('noResult').style.display = filtered.length === 0 ? 'block' : 'none';
}

renderProducts(products);
</script>

</body>
</html>
