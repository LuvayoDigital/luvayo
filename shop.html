<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luvayo Shop — Produits</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #f8f5f0;
  color: #1a1a1a;
  min-height: 100vh;
}
.store { max-width: 480px; margin: 0 auto; padding: 44px 20px 70px; }

/* LOGO */
.logo-wrap { text-align: center; margin-bottom: 28px; }
.logo-link { text-decoration: none; display: inline-block; }
.logo-text {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 40px;
  font-weight: 700;
  letter-spacing: 12px;
  color: #1a1a1a;
  line-height: 1;
  position: relative;
  display: inline-block;
}
.logo-text::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 50%;
  transform: translateX(-50%);
  width: 24px;
  height: 1.5px;
  background: #c4973a;
}
.logo-sub {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 5px;
  color: #c4973a;
  text-transform: uppercase;
  margin-top: 12px;
  display: block;
}
.logo-tagline { font-size: 12px; color: #aaa; font-weight: 300; margin-top: 4px; }

/* TRUST */
.trust {
  display: flex;
  border: 1px solid #e8e2d9;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 24px;
  background: #fff;
}
.trust-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 12px 6px;
  border-right: 1px solid #e8e2d9;
  font-size: 10px;
  font-weight: 500;
  color: #999;
  text-align: center;
  line-height: 1.4;
}
.trust-item:last-child { border-right: none; }
.ti { font-size: 16px; color: #c4973a; }

/* SEARCH */
.search-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #fff;
  border: 1px solid #e8e2d9;
  border-radius: 12px;
  padding: 11px 16px;
  margin-bottom: 26px;
  transition: border-color 0.2s;
}
.search-wrap:focus-within { border-color: #c4973a; }
.search-wrap input {
  background: none; border: none; outline: none;
  color: #1a1a1a; font-size: 14px; font-family: 'Inter', sans-serif; width: 100%;
}
.search-wrap input::placeholder { color: #bbb; }

.no-result { display: none; text-align: center; color: #bbb; font-size: 14px; padding: 50px 0; }

/* GRID */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* PRODUCT CARD */
.product-card {
  display: flex;
  flex-direction: column;
  background: #fff;
  border: 1px solid #e8e2d9;
  border-radius: 16px;
  overflow: hidden;
  text-decoration: none;
  color: inherit;
  transition: border-color 0.22s, transform 0.22s, box-shadow 0.22s;
}
.product-card:hover {
  border-color: #c4973a;
  transform: translateY(-4px);
  box-shadow: 0 10px 28px rgba(0,0,0,0.08);
}

/* IMAGE */
.product-img-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 1/1;
  background: #f0ece4;
  overflow: hidden;
}
.product-img-wrap img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: transform 0.3s ease;
}
.product-card:hover .product-img-wrap img { transform: scale(1.05); }
.badge-promo {
  position: absolute; top: 8px; left: 8px;
  background: #c4973a; color: #fff;
  font-size: 9px; font-weight: 700;
  padding: 3px 7px; border-radius: 4px; letter-spacing: 0.5px;
}
.badge-stock {
  position: absolute; top: 8px; right: 8px;
  background: #3a7d44; color: #fff;
  font-size: 9px; font-weight: 700;
  padding: 3px 7px; border-radius: 4px;
}

/* INFO */
.product-info {
  padding: 12px 12px 14px;
  display: flex; flex-direction: column; gap: 6px; flex: 1;
}
.product-title {
  font-size: 12px; font-weight: 600; color: #333; line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.stars { display: flex; gap: 2px; align-items: center; }
.star { color: #c4973a; font-size: 11px; }
.star-count { font-size: 10px; color: #bbb; margin-left: 3px; }
.price-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.price-new { font-size: 16px; font-weight: 700; color: #c4973a; }
.price-old { font-size: 11px; color: #ccc; text-decoration: line-through; }
.product-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.tag {
  font-size: 10px; color: #aaa;
  background: #f8f5f0; border: 1px solid #e8e2d9;
  border-radius: 4px; padding: 2px 6px; white-space: nowrap;
}

/* WHATSAPP BTN */
.btn-whatsapp {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  background: #25D366; color: #fff;
  font-size: 12px; font-weight: 700; padding: 9px 12px;
  border-radius: 8px; border: none; cursor: pointer;
  text-decoration: none;
  transition: background 0.18s, transform 0.15s;
  margin-top: auto; letter-spacing: 0.3px; font-family: 'Inter', sans-serif;
}
.btn-whatsapp:hover { background: #1db954; transform: scale(1.02); }

/* FOOTER */
.footer {
  text-align: center; margin-top: 54px;
  font-size: 10px; color: #ccc; letter-spacing: 2px; text-transform: uppercase;
}

@media (max-width: 400px) {
  .store { padding: 28px 12px 50px; }
  .logo-text { font-size: 34px; }
  .grid { gap: 12px; }
}
</style>
</head>
<body>
<div class="store">

  <div class="logo-wrap">
    <a class="logo-link" href="index.html">
      <div class="logo-text">Luvayo</div>
    </a>
    <span class="logo-sub">Shop</span>
    <div class="logo-tagline">Produits physiques · Livraison Maroc</div>
  </div>

  <div class="trust">
    <div class="trust-item"><div class="ti">📦</div>Livraison<br>Maroc</div>
    <div class="trust-item"><div class="ti">💬</div>Commande<br>WhatsApp</div>
    <div class="trust-item"><div class="ti">✅</div>Paiement<br>livraison</div>
  </div>

  <div class="search-wrap">
    <svg width="14" height="14" fill="none" stroke="#bbb" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0">
      <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Rechercher un produit..." oninput="filterProducts()">
  </div>

  <div class="no-result" id="noResult">Aucun produit trouvé.</div>
  <div class="grid" id="productGrid"></div>

  <div class="footer">© 2026 Luvayo — Tous droits réservés</div>
</div>

<script>
const WA = "212777750713";
const products = [
  {
    title: "Ventilateur Double Turbine avec Brumisateur",
    price: "200 DH", oldPrice: "350 DH",
    stars: 5, reviews: 124,
    img: "vent4.jpg",
    tags: ["Climatisation","LED","Télécommande","USB"],
    badge: "PROMO", stock: "En stock",
    msg: "Bonjour, je voudrais commander le Ventilateur Double Turbine avec Brumisateur à 200 DH. Merci!"
  }
];

function starsHTML(n) {
  return Array.from({length:5},(_,i)=>`<span class="star">${i<n?'★':'☆'}</span>`).join('');
}
function waLink(msg) {
  return `https://wa.me/${WA}?text=${encodeURIComponent(msg)}`;
}
function renderProducts(list) {
  const grid = document.getElementById('productGrid');
  grid.style.display = list.length === 0 ? 'none' : 'grid';
  grid.innerHTML = list.map(p => `
    <div class="product-card">
      <div class="product-img-wrap">
        <img src="${p.img}" alt="${p.title}" onerror="this.src='';this.style.background='#f0ece4'">
        ${p.badge ? `<div class="badge-promo">${p.badge}</div>` : ''}
        ${p.stock ? `<div class="badge-stock">${p.stock}</div>` : ''}
      </div>
      <div class="product-info">
        <div class="product-title">${p.title}</div>
        <div class="stars">${starsHTML(p.stars)}<span class="star-count">(${p.reviews})</span></div>
        <div class="price-row">
          <span class="price-new">${p.price}</span>
          ${p.oldPrice ? `<span class="price-old">${p.oldPrice}</span>` : ''}
        </div>
        <div class="product-tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        <a class="btn-whatsapp" href="${waLink(p.msg)}" target="_blank">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="white">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
          </svg>
          Commander
        </a>
      </div>
    </div>
  `).join('');
}
function filterProducts() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const filtered = q==='' ? products : products.filter(p=>
    p.title.toLowerCase().includes(q)||p.tags.some(t=>t.toLowerCase().includes(q))
  );
  renderProducts(filtered);
  document.getElementById('noResult').style.display = filtered.length===0 ? 'block' : 'none';
}
renderProducts(products);
</script>
</body>
</html>
