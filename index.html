<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luvayo Digital — Mental Reset Systems</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  min-height: 100vh;
}

.store {
  max-width: 480px;
  margin: 0 auto;
  padding: 36px 20px 60px;
}

/* HEADER */
.header { text-align: center; margin-bottom: 28px; }
.brand {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 5px;
  color: #D4A017;
  margin-bottom: 6px;
}
.tagline {
  font-size: 13px;
  color: #64748b;
  letter-spacing: 0.3px;
}
.divider {
  width: 36px;
  height: 2px;
  background: #D4A017;
  margin: 12px auto 0;
  border-radius: 2px;
}

/* SEARCH */
.search-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 28px;
  transition: border-color 0.2s;
}
.search-wrap:focus-within { border-color: #D4A017; }
.search-wrap input {
  background: none;
  border: none;
  outline: none;
  color: #e2e8f0;
  font-size: 15px;
  width: 100%;
}
.search-wrap input::placeholder { color: #475569; }

/* NO RESULT */
.no-result {
  display: none;
  text-align: center;
  color: #475569;
  font-size: 14px;
  padding: 50px 0;
}

/* GRID — 2 colonnes fixes */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* BOOK CARD */
.book-wrap {
  display: flex;
  flex-direction: column;
  gap: 10px;
  text-decoration: none;
  color: inherit;
}
.book-wrap:hover .book-3d {
  transform: perspective(700px) rotateY(-12deg) translateY(-6px);
}

/* 3D EFFECT */
.book-3d {
  position: relative;
  width: 100%;
  aspect-ratio: 2 / 3;
  transform: perspective(700px) rotateY(-5deg);
  transition: transform 0.28s ease;
  transform-style: preserve-3d;
}
.book-cover {
  position: absolute;
  inset: 0;
  border-radius: 2px 7px 7px 2px;
  overflow: hidden;
  background: #1e293b;
  box-shadow: 5px 8px 24px rgba(0,0,0,0.65);
}
.book-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.book-cover-fallback {
  width: 100%;
  height: 100%;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 14px;
  background: #10203a;
  text-align: center;
  font-size: 12px;
  color: #D4A017;
  font-weight: 600;
  line-height: 1.5;
}
.book-spine {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 11px;
  background: #07111f;
  border-radius: 2px 0 0 2px;
  transform: rotateY(-90deg) translateZ(5.5px);
  transform-origin: left center;
}
.book-shadow {
  position: absolute;
  bottom: -8px;
  left: 10px;
  right: -6px;
  height: 14px;
  background: rgba(0,0,0,0.4);
  border-radius: 50%;
  filter: blur(6px);
  z-index: -1;
}

/* BOOK INFO */
.book-info {
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding: 0 2px;
}
.book-title {
  font-size: 13px;
  font-weight: 600;
  color: #e2e8f0;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* PRICE ROW */
.price-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.price-old {
  font-size: 12px;
  font-weight: 500;
  color: #475569;
  text-decoration: line-through;
}
.price-new {
  font-size: 15px;
  font-weight: 700;
  color: #D4A017;
}
.price-badge {
  font-size: 9px;
  font-weight: 700;
  background: #C0392B;
  color: #fff;
  padding: 1px 5px;
  border-radius: 3px;
  letter-spacing: 0.3px;
}

.book-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 2px;
}
.meta-tag {
  font-size: 10px;
  color: #94a3b8;
  background: #1e293b;
  border: 1px solid #1e3a5f;
  border-radius: 4px;
  padding: 2px 6px;
  white-space: nowrap;
}
.meta-tag.gold {
  color: #D4A017;
  border-color: #3d2e07;
  background: #1c1505;
}

/* FOOTER */
.footer {
  text-align: center;
  margin-top: 50px;
  font-size: 11px;
  color: #1e293b;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

/* MOBILE */
@media (max-width: 400px) {
  .store { padding: 28px 14px 50px; }
  .brand { font-size: 22px; }
  .grid { gap: 14px; }
  .book-title { font-size: 12px; }
  .price-new { font-size: 14px; }
}
</style>
</head>
<body>

<div class="store">

  <div class="header">
    <div class="brand">LUVAYO</div>
    <div class="tagline">Reset your mind. Rebuild your life.</div>
    <div class="divider"></div>
  </div>

  <div class="search-wrap">
    <svg width="15" height="15" fill="none" stroke="#475569" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0">
      <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Search an ebook..." oninput="filterBooks()">
  </div>

  <div class="no-result" id="noResult">No ebook found. Try another word.</div>
  <div class="grid" id="bookGrid"></div>

  <div class="footer">© 2026 Luvayo Digital — All Rights Reserved</div>

</div>

<script>
const books = [
  {
    title: "Stop Overthinking in 7 Days",
    oldPrice: "$12.99",
    newPrice: "$9.99",
    pages: "22 pages",
    size: "649 KB",
    img: "overthinking.png",
    url: "https://luvayo.gumroad.com/l/OverthinkingReset",
    tags: ["overthinking","anxiety","focus","mind"]
  },
  {
    title: "Stop Anxiety in 7 Days",
    oldPrice: "$12.99",
    newPrice: "$9.99",
    pages: "29 pages",
    size: "667 KB",
    img: "anxiety.png",
    url: "https://luvayo.gumroad.com/l/stopanxiety",
    tags: ["anxiety","calm","system","nervous"]
  },
];

function renderBooks(list) {
  const grid = document.getElementById('bookGrid');
  grid.style.display = list.length === 0 ? 'none' : 'grid';
  grid.innerHTML = list.map(b => `
    <a class="book-wrap" href="${b.url}" target="_blank">
      <div class="book-3d">
        <div class="book-spine"></div>
        <div class="book-cover">
          <img src="${b.img}" alt="${b.title}"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="book-cover-fallback">${b.title}</div>
        </div>
        <div class="book-shadow"></div>
      </div>
      <div class="book-info">
        <div class="book-title">${b.title}</div>
        <div class="price-row">
          <span class="price-old">${b.oldPrice}</span>
          <span class="price-new">${b.newPrice}</span>
          <span class="price-badge">SALE</span>
        </div>
        <div class="book-meta">
          <span class="meta-tag">${b.pages}</span>
          <span class="meta-tag">${b.size}</span>
          <span class="meta-tag">PDF</span>
          <span class="meta-tag gold">⚡ Instant download</span>
        </div>
      </div>
    </a>
  `).join('');
}

function filterBooks() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const filtered = q === ''
    ? books
    : books.filter(b =>
        b.title.toLowerCase().includes(q) ||
        b.tags.some(t => t.includes(q))
      );
  renderBooks(filtered);
  document.getElementById('noResult').style.display = filtered.length === 0 ? 'block' : 'none';
}

renderBooks(books);
</script>

</body>
</html>
