<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luvayo Digital</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}

.store {
  max-width: 480px;
  margin: auto;
  padding: 30px 20px;
}

.header { text-align: center; margin-bottom: 25px; }

.brand {
  font-size: 24px;
  font-weight: bold;
  color: gold;
}

.tagline {
  font-size: 13px;
  color: #94a3b8;
}

.search-wrap {
  margin: 20px 0;
}

.search-wrap input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #1e293b;
  color: white;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.book {
  text-decoration: none;
  color: white;
}

.book img {
  width: 100%;
  border-radius: 6px;
}

.book-title {
  font-size: 13px;
  margin-top: 6px;
}

.price {
  color: gold;
  font-weight: bold;
}

.footer {
  text-align: center;
  margin-top: 40px;
  font-size: 12px;
  color: #475569;
}
</style>
</head>

<body>

<div class="store">

  <div class="header">
    <div class="brand">LUVAYO</div>
    <div class="tagline">Reset your mind. Rebuild your life.</div>
  </div>

  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search..." oninput="filterBooks()">
  </div>

  <div class="grid" id="bookGrid"></div>

  <div class="footer">© 2026 Luvayo Digital</div>

</div>

<script>

const books = [
  {
    title: "Overthinking Reset",
    price: "$9.99",
    img: "overthinking.png",
    url: "https://luvayo.gumroad.com/l/OverthinkingReset"
  },
  {
    title: "Anxiety Control System",
    price: "$9.99",
    img: "anxiety.png",
    url: "https://luvayo.gumroad.com/l/anxiety"
  },
  {
    title: "Night Anxiety Reset",
    price: "$9.99",
    img: "nightanxiety.png",
    url: "#"
  },
  {
    title: "From Chaos to Clarity",
    price: "$9.99",
    img: "chaos.png",
    url: "#"
  },
  {
    title: "Unshakable Confidence",
    price: "$9.99",
    img: "confidence.png",
    url: "#"
  },
  {
    title: "Social Confidence Blueprint",
    price: "$9.99",
    img: "socialanxiety.png",
    url: "#"
  },
  {
    title: "Magnetic Presence",
    price: "$9.99",
    img: "magnetic.png",
    url: "#"
  },
  {
    title: "Life Reset Blueprint",
    price: "$9.99",
    img: "reset.png",
    url: "#"
  },
  {
    title: "Burnout Recovery System",
    price: "$9.99",
    img: "burnout.png",
    url: "#"
  },
  {
    title: "Minimalist Mindset",
    price: "$9.99",
    img: "minimalist.png",
    url: "#"
  }
];

function renderBooks(list) {
  const grid = document.getElementById("bookGrid");

  grid.innerHTML = list.map(b => `
    <a class="book" href="${b.url}" target="_blank">
      <img src="${b.img}">
      <div class="book-title">${b.title}</div>
      <div class="price">${b.price}</div>
    </a>
  `).join("");
}

function filterBooks() {
  const q = document.getElementById("searchInput").value.toLowerCase();

  const filtered = books.filter(b =>
    b.title.toLowerCase().includes(q)
  );

  renderBooks(filtered);
}

renderBooks(books);

</script>

</body>
</html>
