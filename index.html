body {

.divider {

}

/* SEARCH */
.search-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 28px;
}
.search-wrap input {
  background: none;
  border: none;
  outline: none;
  color: #e2e8f0;
  width: 100%;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* CARD */
.book-wrap {
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.book-3d {
  position: relative;
  width: 100%;
  aspect-ratio: 2/3;
  transform: perspective(700px) rotateY(-5deg);
  transition: 0.3s;
}
.book-wrap:hover .book-3d {
  transform: perspective(700px) rotateY(-12deg) translateY(-6px);
}

.book-cover {
  position: absolute;
  inset: 0;
  border-radius: 4px;
  overflow: hidden;
  background: #1e293b;
  box-shadow: 5px 8px 24px rgba(0,0,0,0.6);
}
.book-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.book-info { padding: 0 2px; }
.book-title {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.4;
}
.book-price {
  color: #D4A017;
  font-weight: 700;
  font-size: 15px;
}

/* FOOTER */
.footer {
  text-align: center;
  margin-top: 50px;
  font-size: 11px;
  color: #1e293b;
}
</style>
</head>
